version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: heidi-postgres
    environment:
      POSTGRES_USER: heidi_user
      POSTGRES_PASSWORD: heidi_password
      POSTGRES_DB: heidi_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heidi_user -d heidi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: heidi-backend
    environment:
      DATABASE_URL: postgresql://heidi_user:heidi_password@postgres:5432/heidi_db?schema=public
      PORT: 3001
      NODE_ENV: development
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: http://localhost:3000
      PLATFORM_FEE_PERCENTAGE: 20
      PLATFORM_FEE_MINIMUM_CENTS: 500
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: heidi-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  postgres_data:
